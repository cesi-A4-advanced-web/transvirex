services:
    frontend:
        build:
            context: .
            dockerfile: ./Dockerfile
            target: development
        image: transvirex-frontend
        container_name: transvirex-frontend
        environment:
            - NODE_ENV=${NODE_ENV:-development}
            - FRONTEND_HOST=${FRONTEND_HOST:-localhost}
            - FRONTEND_PORT=${FRONTEND_PORT:-3000}
            - API_HOST=${API_HOST:-gateway-service}
            - API_PORT=${API_PORT:-3000}
        volumes:
            # - ./:/app
            - /app/node_modules
            - /app/.nuxt
        depends_on:
            - gateway-service
        restart: unless-stopped
        networks:
            - transvirex-network
        develop:
            watch:
                - path: ./
                  ignore:
                      - node_modules
                      - .nuxt
                      - dist
                  action: sync
                  target: /app
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.frontend.rule=Host(`www.transvirex.local`)|Host(`transvirex.local`)' # Use a custom hostname for the frontend
            - 'traefik.http.services.frontend.loadbalancer.server.port=3000' # Expose the frontend port
