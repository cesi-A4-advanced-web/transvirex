apiVersion: apps/v1
kind: Deployment
metadata:
    name: transvirex-users
    namespace: production
    labels:
        app: transvirex-users
spec:
    replicas: 1
    selector:
        matchLabels:
            app: transvirex-users
    template:
        metadata:
            labels:
                app: transvirex-users
        spec:
            imagePullSecrets:
                - name: ghcr-secret
            containers:
                - name: users
                  image: ghcr.io/cesi-a4-advanced-web/transvirex-users-service:latest
                  imagePullPolicy: Always
                  env:
                      - name: NODE_ENV
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: NODE_ENV
                      - name: RABBITMQ_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_HOST
                      - name: RABBITMQ_PORT
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_PORT
                      - name: RABBITMQ_USER
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_USER
                      - name: RABBITMQ_PASSWORD
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_PASSWORD
                      - name: POSTGRES_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_HOST
                      - name: POSTGRES_PORT
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_PORT
                      - name: POSTGRES_USER
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_USER
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_PASSWORD
                      - name: POSTGRES_DB
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_DB
                      - name: LOG_LEVEL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: LOG_LEVEL
                      - name: REDIS_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: REDIS_HOST
                      - name: REDIS_PORT
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: REDIS_PORT
                      - name: REDIS_PASSWORD
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: REDIS_PASSWORD
                      - name: REDIS_DB
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: REDIS_DB
                  ports:
                      - containerPort: 3000
                        name: http
                  resources:
                      requests:
                          cpu: 100m
                          memory: 64Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
    name: transvirex-users
    namespace: production
    labels:
        app: transvirex-users
spec:
    type: ClusterIP
    selector:
        app: transvirex-users
    ports:
        - port: 3000
          targetPort: 3000
          name: http
          protocol: TCP
