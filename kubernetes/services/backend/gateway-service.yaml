apiVersion: apps/v1
kind: Deployment
metadata:
    name: transvirex-gateway
    namespace: production
    labels:
        app: transvirex-gateway
spec:
    replicas: 1
    selector:
        matchLabels:
            app: transvirex-gateway
    template:
        metadata:
            labels:
                app: transvirex-gateway
        spec:
            imagePullSecrets:
                - name: ghcr-secret
            containers:
                - name: gateway
                  image: ghcr.io/cesi-A4-advanced-web/transvirex-gateway-service:latest
                  imagePullPolicy: Always
                  env:
                      - name: NODE_ENV
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: NODE_ENV
                      - name: API_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: API_HOST
                      - name: API_PORT
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: API_PORT
                      - name: POSTGRES_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_HOST
                      - name: POSTGRES_PORT
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_PORT
                      - name: POSTGRES_USER
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_USER
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_PASSWORD
                      - name: POSTGRES_DB
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: POSTGRES_DB
                      - name: RABBITMQ_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_HOST
                      - name: RABBITMQ_PORT
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_PORT
                      - name: RABBITMQ_USER
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_USER
                      - name: RABBITMQ_PASSWORD
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_PASSWORD
                      - name: LOG_LEVEL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: LOG_LEVEL
                      - name: JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: transvirex-secrets
                                key: JWT_SECRET
                      - name: ACCESS_TOKEN_TTL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: ACCESS_TOKEN_TTL
                      - name: REFRESH_TOKEN_TTL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: REFRESH_TOKEN_TTL
                      - name: AUTH_SERVICE_URL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: AUTH_SERVICE_URL
                      - name: BILLING_SERVICE_URL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: BILLING_SERVICE_URL
                      - name: DELIVERY_SERVICE_URL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: DELIVERY_SERVICE_URL
                      - name: STOCK_SERVICE_URL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: STOCK_SERVICE_URL
                      - name: USERS_SERVICE_URL
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: USERS_SERVICE_URL
                  ports:
                      - containerPort: 3000
                        name: http
                  resources:
                      requests:
                          cpu: 100m
                          memory: 64Mi
                      limits:
                          cpu: 500m
                          memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
    name: transvirex-gateway
    namespace: production
    labels:
        app: transvirex-gateway
spec:
    type: ClusterIP
    selector:
        app: transvirex-gateway
    ports:
        - port: 3000
          targetPort: 3000
          name: http
          protocol: TCP
