apiVersion: apps/v1
kind: Deployment
metadata:
    name: redis
    namespace: production
    labels:
        app: redis
spec:
    replicas: 1
    selector:
        matchLabels:
            app: redis
    template:
        metadata:
            labels:
                app: redis
        spec:
            containers:
                - name: redis
                  image: redis:7-alpine
                  ports:
                      - containerPort: 6379
                  command:
                      - redis-server
                      - --requirepass
                      - $(REDIS_PASSWORD)
                      - --appendonly
                      - 'yes'
                  env:
                      - name: REDIS_PASSWORD
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: REDIS_PASSWORD
                  volumeMounts:
                      - name: redis-data
                        mountPath: /data
                  resources:
                      requests:
                          cpu: 50m
                          memory: 32Mi
                      limits:
                          cpu: 100m
                          memory: 128Mi
            volumes:
                - name: redis-data
                  emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
    name: redis
    namespace: production
spec:
    selector:
        app: redis
    ports:
        - port: 6379
          targetPort: 6379
