apiVersion: apps/v1
kind: Deployment
metadata:
    name: redis-commander
    namespace: production
    labels:
        app: redis-commander
spec:
    replicas: 1
    selector:
        matchLabels:
            app: redis-commander
    template:
        metadata:
            labels:
                app: redis-commander
        spec:
            containers:
                - name: redis-commander
                  image: rediscommander/redis-commander:latest
                  env:
                      - name: REDIS_HOSTS
                        value: "local:redis:6379:0:redis_password"
                  ports:
                      - containerPort: 8081
                        name: http
                  resources:
                      requests:
                          cpu: 50m
                          memory: 32Mi
                      limits:
                          cpu: 100m
                          memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
    name: redis-commander
    namespace: production
    labels:
        app: redis-commander
spec:
    type: ClusterIP
    selector:
        app: redis-commander
    ports:
        - port: 8081
          targetPort: 8081
          name: http
          protocol: TCP
