# The `transvirex-secrets` Kubernetes secret is created automatically by the CI/CD pipeline
# (see .github/workflows/deploy.yaml) from the following GitHub Actions repository secrets:
#
#   JWT_SECRET       — secret used to sign and verify JWT access tokens
#   DEEPSEEK_API_KEY — API key for the DeepSeek LLM (used by the AI service)
#
# To create it manually on the cluster (e.g. first-time setup):
#
#   kubectl create secret generic transvirex-secrets \
#     --namespace=production \
#     --from-literal=JWT_SECRET=<your-jwt-secret> \
#     --from-literal=DEEPSEEK_API_KEY=<your-deepseek-api-key>
#
# To add DEEPSEEK_API_KEY to an existing secret:
#
#   kubectl patch secret transvirex-secrets \
#     --namespace=production \
#     --type=merge \
#     -p '{"stringData": {"DEEPSEEK_API_KEY": "<your-deepseek-api-key>"}}'
#
# Do not store actual secret values in this file or commit them to git.
