apiVersion: v1
kind: ConfigMap
metadata:
    name: transvirex-config
    namespace: production
data:
    # ===================================
    # 🌐 Application Settings
    # ===================================
    NODE_ENV: 'production'
    APP_NAME: 'Transvirex ERP'

    # ===================================
    # 💻 Frontend & API
    # ===================================
    FRONTEND_HOST: 'localhost'
    FRONTEND_PORT: '3000'
    API_HOST: 'transvirex-gateway'
    API_PORT: '3000'
    AUTH_SERVICE_URL: 'http://transvirex-authentication:3001'
    BILLING_SERVICE_URL: 'http://transvirex-billing:3002'
    DELIVERY_SERVICE_URL: 'http://transvirex-delivery:3003'
    STOCK_SERVICE_URL: 'http://transvirex-stock:3004'
    USERS_SERVICE_URL: 'http://transvirex-users:3005'

    # ===================================
    # 🗄️ Database - PostgreSQL
    # ===================================
    POSTGRES_HOST: 'postgres'
    POSTGRES_PORT: '5432'
    POSTGRES_USER: 'postgres_user'
    POSTGRES_PASSWORD: 'postgres_password'
    POSTGRES_DB: 'transvirex'

    # ===================================
    # 📨 Message Queue - RabbitMQ
    # ===================================
    RABBITMQ_HOST: 'rabbitmq'
    RABBITMQ_PORT: '5672'
    RABBITMQ_USER: 'rabbitmq_user'
    RABBITMQ_PASSWORD: 'rabbitmq_password'
    RABBITMQ_MANAGEMENT_PORT: '15672'

    # ===================================
    # 🔴 Cache - Redis
    # ===================================
    REDIS_HOST: 'redis'
    REDIS_PORT: '6379'
    REDIS_PASSWORD: 'redis_password'
    REDIS_DB: '0'

    # ===================================
    # 🔐 Security & Authentication
    # ===================================
    # JWT_SECRET=your-super-secret-jwt-key-change-in-production
    # JWT_EXPIRATION=24h
    # JWT_REFRESH_SECRET=your-super-secret-refresh-key-change-in-production
    # JWT_REFRESH_EXPIRATION=7d

    # ===================================
    # 📊 Logging & Monitoring
    # ===================================
    LOG_LEVEL: 'debug'

    # # ===================================
    # # 📧 Email (Optional - for notifications)
    # # ===================================
    # SMTP_HOST=smtp.gmail.com
    # SMTP_PORT=587
    # SMTP_USER=your-email@gmail.com
    # SMTP_PASSWORD=your-app-password
    # EMAIL_FROM=noreply@transvirex.com

    # ===================================
    # 🛠️ pgAdmin
    # ===================================
    PGADMIN_EMAIL: 'admin@transvirex.com'
    PGADMIN_PASSWORD: 'admin'

    # ===================================
    # ⚙️ Development Tools
    # ===================================
    DEBUG: '*'
