# Configuration Traefik Helm Chart
# Valeurs pour le déploiement Traefik sur Kubernetes

# Service externe - expose Traefik à internet
service:
    type: LoadBalancer # VPS a une adresse IP fixe, on expose directement

# Ingress - dit à K8s que Traefik est le contrôleur d'ingress
ingressClass:
    enabled: true
    isDefaultClass: true

# Configuration globale Traefik
global:
    checkNewVersion: false
    sendAnonymousUsage: false

# Points d'entrée (ports d'écoute)
ports:
    web:
        port: 80 # Port interne du conteneur
    websecure:
        port: 443 # Port interne du conteneur
    traefik:
        port: 9000 # Dashboard sur port 9000
    k8s-dashboard:
        port: 8443 # Kubernetes Dashboard sur port 8443

# Dashboard Traefik
api:
    dashboard: true
    debug: false
    insecure: true # Accessible sur :8080/dashboard

# Ressources
resources:
    limits:
        cpu: 500m # 0.5 CPU max
        memory: 512Mi # 512 MB max
    requests:
        cpu: 100m # réserve 0.1 CPU
        memory: 128Mi # réserve 128 MB
