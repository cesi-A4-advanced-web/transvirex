name: 🚀 Build & Deploy

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/transvirex-frontend

jobs:
    build:
        name: 🏗️ Build Docker Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🐳 Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: 🔐 Log in to Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 📝 Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix={{branch}}-
                      type=raw,value=latest,enable={{is_default_branch}}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

            - name: 🏗️ Build and push image
              uses: docker/build-push-action@v5
              with:
                  context: ./packages/frontend
                  file: ./packages/frontend/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: 🚀 Deploy to Production
        runs-on: ubuntu-latest
        needs: [build]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔑 Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 📋 Create production namespace
              uses: appleboy/ssh-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: github-actions
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  script: |
                      kubectl create namespace production --kubeconfig ~/.kube/config 2>/dev/null || true

            - name: 🚀 Transfer K8s manifests
              uses: appleboy/scp-action@v0.1.4
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: github-actions
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  source: 'kubernetes/'
                  target: '/tmp/k8s-manifests'
                  overwrite: true

            - name: ⚡ Apply manifests & rollout
              uses: appleboy/ssh-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: github-actions
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  script: |
                      kubectl apply -k /tmp/k8s-manifests/kubernetes --kubeconfig ~/.kube/config

                      # ✅ Fix 4 : force le pull de la nouvelle image même avec le tag latest
                      kubectl rollout restart deployment/transvirex-frontend -n production --kubeconfig ~/.kube/config

                      kubectl rollout status deployment/transvirex-frontend -n production --timeout=5m --kubeconfig ~/.kube/config

                      rm -rf /tmp/k8s-manifests

    notify:
        name: 📢 Notify
        runs-on: ubuntu-latest
        needs: [build, deploy]
        if: always()

        steps:
            - name: ✅ Success
              if: success()
              run: echo "✅ Pipeline completed successfully!"

            - name: ❌ Failure
              if: failure()
              run: |
                  echo "❌ Pipeline failed!"
                  exit 1
