name: 🚀 Build & Deploy

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop

env:
    REGISTRY: ghcr.io

jobs:
    build-frontend:
        name: 🏗️ Build Frontend Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              if: github.event_name != 'pull_request'
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/transvirex-frontend
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}
            - uses: docker/build-push-action@v5
              with:
                  context: ./packages/frontend
                  file: ./packages/frontend/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  target: production
                  cache-from: type=gha,scope=frontend
                  cache-to: type=gha,scope=frontend,mode=max

    build-gateway:
        name: 🏗️ Build Gateway Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              if: github.event_name != 'pull_request'
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/transvirex-gateway-service
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}
            - uses: docker/build-push-action@v5
              with:
                  context: ./packages/backend
                  file: ./packages/backend/apps/gateway/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  target: runtime
                  cache-from: type=gha,scope=gateway
                  cache-to: type=gha,scope=gateway,mode=max

    build-authentication:
        name: 🏗️ Build Authentication Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              if: github.event_name != 'pull_request'
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/transvirex-authentication-service
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}
            - uses: docker/build-push-action@v5
              with:
                  context: ./packages/backend
                  file: ./packages/backend/apps/authentication/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  target: runtime
                  cache-from: type=gha,scope=authentication
                  cache-to: type=gha,scope=authentication,mode=max

    build-billing:
        name: 🏗️ Build Billing Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              if: github.event_name != 'pull_request'
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/transvirex-billing-service
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}
            - uses: docker/build-push-action@v5
              with:
                  context: ./packages/backend
                  file: ./packages/backend/apps/billing/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  target: runtime
                  cache-from: type=gha,scope=billing
                  cache-to: type=gha,scope=billing,mode=max

    build-stock:
        name: 🏗️ Build Stock Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              if: github.event_name != 'pull_request'
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/transvirex-stock-service
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}
            - uses: docker/build-push-action@v5
              with:
                  context: ./packages/backend
                  file: ./packages/backend/apps/stock/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  target: runtime
                  cache-from: type=gha,scope=stock
                  cache-to: type=gha,scope=stock,mode=max

    build-delivery:
        name: 🏗️ Build Delivery Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              if: github.event_name != 'pull_request'
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/transvirex-delivery-service
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}
            - uses: docker/build-push-action@v5
              with:
                  context: ./packages/backend
                  file: ./packages/backend/apps/delivery/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  target: runtime
                  cache-from: type=gha,scope=delivery
                  cache-to: type=gha,scope=delivery,mode=max

    build-users:
        name: 🏗️ Build Users Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              if: github.event_name != 'pull_request'
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/transvirex-users-service
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable={{is_default_branch}}
            - uses: docker/build-push-action@v5
              with:
                  context: ./packages/backend
                  file: ./packages/backend/apps/users/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  target: runtime
                  cache-from: type=gha,scope=users
                  cache-to: type=gha,scope=users,mode=max

    deploy:
        name: 🚀 Deploy to Production
        runs-on: ubuntu-latest
        needs:
            [
                build-frontend,
                build-gateway,
                build-authentication,
                build-billing,
                build-stock,
                build-delivery,
                build-users,
            ]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - uses: actions/checkout@v4

            - uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 📋 Create production namespace & registry secret
              uses: appleboy/ssh-action@v0.1.7
              env:
                  GHCR_USERNAME: ${{ github.actor }}
                  GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: github-actions
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  envs: GHCR_USERNAME,GHCR_TOKEN
                  script: |
                      kubectl create namespace production --kubeconfig ~/.kube/config 2>/dev/null || true
                      kubectl delete secret ghcr-secret -n production --kubeconfig ~/.kube/config 2>/dev/null || true
                      kubectl create secret docker-registry ghcr-secret \
                        --docker-server=ghcr.io \
                        --docker-username=$GHCR_USERNAME \
                        --docker-password=$GHCR_TOKEN \
                        -n production \
                        --kubeconfig ~/.kube/config
                      rm -rf /tmp/k8s-manifests && mkdir -p /tmp/k8s-manifests

            - name: 🚀 Transfer K8s manifests
              uses: appleboy/scp-action@v0.1.4
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: github-actions
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  source: 'kubernetes/'
                  target: '/tmp/k8s-manifests'
                  overwrite: true

            - name: ⚡ Apply manifests & rollout
              uses: appleboy/ssh-action@v0.1.7
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: github-actions
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  command_timeout: 15m
                  script: |
                      kubectl apply -k /tmp/k8s-manifests/kubernetes --kubeconfig ~/.kube/config

                      kubectl rollout restart deployment/transvirex-frontend -n production --kubeconfig ~/.kube/config
                      kubectl rollout restart deployment/transvirex-gateway -n production --kubeconfig ~/.kube/config
                      kubectl rollout restart deployment/transvirex-authentication -n production --kubeconfig ~/.kube/config
                      kubectl rollout restart deployment/transvirex-billing -n production --kubeconfig ~/.kube/config
                      kubectl rollout restart deployment/transvirex-stock -n production --kubeconfig ~/.kube/config
                      kubectl rollout restart deployment/transvirex-delivery -n production --kubeconfig ~/.kube/config
                      kubectl rollout restart deployment/transvirex-users -n production --kubeconfig ~/.kube/config

                      kubectl rollout status deployment/transvirex-frontend -n production --timeout=10m --kubeconfig ~/.kube/config
                      kubectl rollout status deployment/transvirex-gateway -n production --timeout=10m --kubeconfig ~/.kube/config
                      kubectl rollout status deployment/transvirex-authentication -n production --timeout=10m --kubeconfig ~/.kube/config
                      kubectl rollout status deployment/transvirex-billing -n production --timeout=10m --kubeconfig ~/.kube/config
                      kubectl rollout status deployment/transvirex-stock -n production --timeout=10m --kubeconfig ~/.kube/config
                      kubectl rollout status deployment/transvirex-delivery -n production --timeout=10m --kubeconfig ~/.kube/config
                      kubectl rollout status deployment/transvirex-users -n production --timeout=10m --kubeconfig ~/.kube/config

                      rm -rf /tmp/k8s-manifests

    notify:
        name: 📢 Notify
        runs-on: ubuntu-latest
        needs:
            [
                build-frontend,
                build-gateway,
                build-authentication,
                build-billing,
                build-stock,
                build-delivery,
                build-users,
                deploy,
            ]
        if: always()

        steps:
            - name: ✅ Notify Discord - Success
              if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
              run: |
                  curl -H "Content-Type: application/json" \
                    -d '{
                      "embeds": [{
                        "title": "✅ Déploiement réussi",
                        "color": 3066993,
                        "fields": [
                          {"name": "Repo", "value": "${{ github.repository }}", "inline": true},
                          {"name": "Branche", "value": "${{ github.ref_name }}", "inline": true},
                          {"name": "Commit", "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": false},
                          {"name": "Déclenché par", "value": "${{ github.actor }}", "inline": true}
                        ]
                      }]
                    }' \
                    ${{ secrets.DISCORD_WEBHOOK_URL }}

            - name: ❌ Notify Discord - Failure
              if: ${{ contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && github.event_name != 'pull_request' }}
              run: |
                  curl -H "Content-Type: application/json" \
                    -d '{
                      "embeds": [{
                        "title": "❌ Déploiement échoué",
                        "color": 15158332,
                        "fields": [
                          {"name": "Repo", "value": "${{ github.repository }}", "inline": true},
                          {"name": "Branche", "value": "${{ github.ref_name }}", "inline": true},
                          {"name": "Commit", "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": false},
                          {"name": "Déclenché par", "value": "${{ github.actor }}", "inline": true},
                          {"name": "Logs", "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                        ]
                      }]
                    }' \
                    ${{ secrets.DISCORD_WEBHOOK_URL }}

            - name: ⚠️ Notify Discord - Cancelled
              if: ${{ contains(needs.*.result, 'cancelled') && github.event_name != 'pull_request' }}
              run: |
                  curl -H "Content-Type: application/json" \
                    -d '{
                      "embeds": [{
                        "title": "⚠️ Déploiement annulé",
                        "color": 16776960,
                        "fields": [
                          {"name": "Repo", "value": "${{ github.repository }}", "inline": true},
                          {"name": "Branche", "value": "${{ github.ref_name }}", "inline": true},
                          {"name": "Commit", "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": false},
                          {"name": "Déclenché par", "value": "${{ github.actor }}", "inline": true},
                          {"name": "Logs", "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                        ]
                      }]
                    }' \
                    ${{ secrets.DISCORD_WEBHOOK_URL }}

            - name: ⚠️ Notify Discord - PR Build failure
              if: ${{ contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && github.event_name == 'pull_request' }}
              run: |
                  curl -H "Content-Type: application/json" \
                    -d '{
                      "embeds": [{
                        "title": "❌ Build de PR échoué",
                        "color": 15158332,
                        "fields": [
                          {"name": "Repo", "value": "${{ github.repository }}", "inline": true},
                          {"name": "PR", "value": "[#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})", "inline": true},
                          {"name": "Commit", "value": "[`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})", "inline": false},
                          {"name": "Déclenché par", "value": "${{ github.actor }}", "inline": true},
                          {"name": "Logs", "value": "[${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                        ]
                      }]
                    }' \
                    ${{ secrets.DISCORD_WEBHOOK_URL }}
