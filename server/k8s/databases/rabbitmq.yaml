---
# RabbitMQ Secret
apiVersion: v1
kind: Secret
metadata:
    name: rabbitmq-credentials
    namespace: databases
type: Opaque
stringData:
    RABBITMQ_DEFAULT_USER: rabbitmq
    RABBITMQ_DEFAULT_PASS: 'change-me-strong-password'

---
# RabbitMQ Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: rabbitmq-pvc
    namespace: databases
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 5Gi

---
# RabbitMQ Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
    name: rabbitmq
    namespace: databases
    labels:
        app: rabbitmq
        version: '3'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: rabbitmq
    template:
        metadata:
            labels:
                app: rabbitmq
        spec:
            containers:
                - name: rabbitmq
                  image: rabbitmq:3-management-alpine
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: amqp
                        containerPort: 5672
                        protocol: TCP
                      - name: management
                        containerPort: 15672
                        protocol: TCP
                  env:
                      - name: RABBITMQ_DEFAULT_USER
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-credentials
                                key: RABBITMQ_DEFAULT_USER
                      - name: RABBITMQ_DEFAULT_PASS
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-credentials
                                key: RABBITMQ_DEFAULT_PASS
                  volumeMounts:
                      - name: rabbitmq-storage
                        mountPath: /var/lib/rabbitmq
                  resources:
                      requests:
                          memory: '256Mi'
                          cpu: '100m'
                      limits:
                          memory: '512Mi'
                          cpu: '500m'
                  livenessProbe:
                      exec:
                          command:
                              - rabbitmq-diagnostics
                              - ping
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      exec:
                          command:
                              - rabbitmq-diagnostics
                              - ping
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 1
                      failureThreshold: 3
            volumes:
                - name: rabbitmq-storage
                  persistentVolumeClaim:
                      claimName: rabbitmq-pvc

---
# RabbitMQ Service
apiVersion: v1
kind: Service
metadata:
    name: rabbitmq
    namespace: databases
    labels:
        app: rabbitmq
spec:
    type: ClusterIP
    ports:
        - name: amqp
          port: 5672
          targetPort: 5672
          protocol: TCP
        - name: management
          port: 15672
          targetPort: 15672
          protocol: TCP
    selector:
        app: rabbitmq
