---
# PostgreSQL Secret
apiVersion: v1
kind: Secret
metadata:
    name: postgres-credentials
    namespace: databases
type: Opaque
stringData:
    POSTGRES_PASSWORD: 'change-me-strong-password'
    POSTGRES_USER: postgres

---
# PostgreSQL Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: postgres-pvc
    namespace: databases
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 10Gi

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
    name: postgres
    namespace: databases
    labels:
        app: postgres
        version: '14'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: postgres
    template:
        metadata:
            labels:
                app: postgres
        spec:
            containers:
                - name: postgres
                  image: postgres:14-alpine
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: postgres
                        containerPort: 5432
                        protocol: TCP
                  env:
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: postgres-credentials
                                key: POSTGRES_PASSWORD
                      - name: POSTGRES_USER
                        valueFrom:
                            secretKeyRef:
                                name: postgres-credentials
                                key: POSTGRES_USER
                      - name: PGDATA
                        value: /var/lib/postgresql/data/pgdata
                  volumeMounts:
                      - name: postgres-storage
                        mountPath: /var/lib/postgresql/data
                  resources:
                      requests:
                          memory: '256Mi'
                          cpu: '100m'
                      limits:
                          memory: '512Mi'
                          cpu: '500m'
                  livenessProbe:
                      exec:
                          command:
                              - /bin/sh
                              - -c
                              - pg_isready -U postgres
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      exec:
                          command:
                              - /bin/sh
                              - -c
                              - pg_isready -U postgres
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 1
                      failureThreshold: 3
            volumes:
                - name: postgres-storage
                  persistentVolumeClaim:
                      claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
    name: postgres
    namespace: databases
    labels:
        app: postgres
spec:
    type: ClusterIP
    ports:
        - name: postgres
          port: 5432
          targetPort: 5432
          protocol: TCP
    selector:
        app: postgres
