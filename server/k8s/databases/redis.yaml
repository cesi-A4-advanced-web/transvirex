---
# Redis Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: redis-pvc
    namespace: databases
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 5Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
    name: redis
    namespace: databases
    labels:
        app: redis
        version: '7'
spec:
    replicas: 1
    selector:
        matchLabels:
            app: redis
    template:
        metadata:
            labels:
                app: redis
        spec:
            containers:
                - name: redis
                  image: redis:7-alpine
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: redis
                        containerPort: 6379
                        protocol: TCP
                  command:
                      - redis-server
                      - '--appendonly'
                      - 'yes'
                  volumeMounts:
                      - name: redis-storage
                        mountPath: /data
                  resources:
                      requests:
                          memory: '128Mi'
                          cpu: '50m'
                      limits:
                          memory: '256Mi'
                          cpu: '200m'
                  livenessProbe:
                      exec:
                          command:
                              - redis-cli
                              - ping
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 1
                      failureThreshold: 3
                  readinessProbe:
                      exec:
                          command:
                              - redis-cli
                              - ping
                      initialDelaySeconds: 5
                      periodSeconds: 5
                      timeoutSeconds: 1
                      failureThreshold: 3
            volumes:
                - name: redis-storage
                  persistentVolumeClaim:
                      claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
    name: redis
    namespace: databases
    labels:
        app: redis
spec:
    type: ClusterIP
    ports:
        - name: redis
          port: 6379
          targetPort: 6379
          protocol: TCP
    selector:
        app: redis
