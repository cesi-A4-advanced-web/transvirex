apiVersion: apps/v1
kind: Deployment
metadata:
    name: transvirex-frontend
    namespace: production
    labels:
        app: transvirex-frontend
spec:
    replicas: 2
    selector:
        matchLabels:
            app: transvirex-frontend
    template:
        metadata:
            labels:
                app: transvirex-frontend
        spec:
            imagePullSecrets:
                - name: ghcr-secret
            containers:
                - name: frontend
                  image: ghcr.io/alecfoucher/transvirex-frontend:latest
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 3000
                        name: http
                  env:
                      - name: NODE_ENV
                        value: 'production'
                      - name: PORT
                        value: '3000'
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
    name: transvirex-frontend
    namespace: production
    labels:
        app: transvirex-frontend
spec:
    type: ClusterIP
    selector:
        app: transvirex-frontend
    ports:
        - port: 80
          targetPort: 3000
          name: http
          protocol: TCP
