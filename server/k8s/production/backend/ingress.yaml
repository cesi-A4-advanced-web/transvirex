apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
    name: transvirex-backend
    namespace: production
spec:
    entryPoints:
        - web
        - websecure
    routes:
        - match: Host(`api.transvirex.com`)
          kind: Rule
          services:
              - name: transvirex
                namespace: production
                port: 80
    tls:
        secretName: certs
