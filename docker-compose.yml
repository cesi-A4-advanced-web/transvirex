services:
    # <=> K8s namespace: Production
    frontend:
        build:
            context: ./src/frontend
            dockerfile: Dockerfile
        ports:
            - '5173:5173'
        environment:
            PORT: 5173
            HOST: 0.0.0.0
            NODE_ENV: production
            API_BASE_URL: https://localhost:3000/
            REDIS_HOST: redis
            REDIS_PORT: 6379
        restart: unless-stopped
        depends_on:
            - backend
            - redis

    backend:
        build:
            context: ./src/backend
            dockerfile: Dockerfile
        ports:
            - '3000:3000'
        environment:
            PORT: 3000
            NODE_ENV: production

            # Postgres connection settings
            POSTGRES_HOST: postgres
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: mydb

            # RabbitMQ connection settings
            RABBITMQ_HOST: rabbitmq
            RABBITMQ_PORT: 5672
            RABBITMQ_USER: guest
            RABBITMQ_PASSWORD: guest

            # Redis connection settings
            REDIS_HOST: redis
            REDIS_PORT: 6379
        restart: unless-stopped
        depends_on:
            - postgres
            - rabbitmq
            - redis

    # <=> K8s namespace: Databases
    postgres:
        image: postgres:15
        environment:
            POSTGRES_USER: user
            POSTGRES_PASSWORD: password
            POSTGRES_DB: mydb
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped

    rabbitmq:
        image: rabbitmq:3-management
        ports:
            - '5672:5672' # RabbitMQ main port
            - '15672:15672' # RabbitMQ management UI
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        restart: unless-stopped

    redis:
        image: redis:7
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        restart: unless-stopped

volumes:
    postgres_data:
    rabbitmq_data:
    redis_data:
