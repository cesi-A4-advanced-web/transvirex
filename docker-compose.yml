name: transvirex

services:
    # ===================================
    # 🌐 Frontend Service
    # ===================================
    frontend:
        extends:
            file: ./packages/frontend/docker-compose.yml
            service: frontend

    # ===================================
    # 🔌 API Gateway / Main Service
    # ===================================
    gateway-service:
        extends:
            file: ./packages/backend/apps/gateway/docker-compose.yml
            service: gateway-service

    # ===================================
    # 🐝 Microservices (Separate Containers)
    # ===================================
    authentication-service:
        extends:
            file: ./packages/backend/apps/authentication/docker-compose.yml
            service: authentication-service
            volumes:
                - authentication_service_cache
    stock-service:
        extends:
            file: ./packages/backend/apps/stock/docker-compose.yml
            service: stock-service
    delivery-service:
        extends:
            file: ./packages/backend/apps/delivery/docker-compose.yml
            service: delivery-service
    users-service:
        extends:
            file: ./packages/backend/apps/users/docker-compose.yml
            service: users-service
    billing-service:
        extends:
            file: ./packages/backend/apps/billing/docker-compose.yml
            service: billing-service

    # ===================================
    # 🌱 Database Seed (run once, then stops)
    # ===================================
    seed:
        build:
            context: ./packages/backend
            dockerfile: ./apps/authentication/Dockerfile
            target: development
        container_name: transvirex-seed
        environment:
            - POSTGRES_HOST=postgres
            - POSTGRES_PORT=5432
            - POSTGRES_USER=${POSTGRES_USER:-postgres_user}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
            - POSTGRES_DB=${POSTGRES_DB:-transvirex}
        command: >
            sh -c "export DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@postgres:5432/$POSTGRES_DB
            && pnpm exec prisma db seed"
        depends_on:
            postgres:
                condition: service_healthy
        restart: 'no'
        networks:
            - transvirex-network

    # ===================================
    # 🛠️ Dev Tools
    # ===================================
    redis-commander:
        image: rediscommander/redis-commander:latest
        container_name: transvirex-redis-commander
        environment:
            - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redis_password}
        restart: unless-stopped
        depends_on:
            - redis
        networks:
            - transvirex-network


    # ===================================
    # 💾 Databases & Message Brokers
    # ===================================
    postgres:
        image: postgres:16-alpine
        container_name: transvirex-postgres
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
            POSTGRES_DB: ${POSTGRES_DB:-transvirex}
            POSTGRES_INITDB_ARGS: '-E UTF8 -c max_connections=200'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER:-postgres_user} -d ${POSTGRES_DB:-transvirex} -h localhost',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - transvirex-network

    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: transvirex-rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitmq_user}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_password}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - transvirex-network

    redis:
        image: redis:7-alpine
        container_name: transvirex-redis
        environment:
            - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
            - REDIS_HOST=${REDIS_HOST:-redis}
            - REDIS_PORT=${REDIS_PORT:-6379}
            - REDIS_DB=${REDIS_DB:-0}
        volumes:
            - redis_data:/data
        restart: unless-stopped
        command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
        healthcheck:
            test:
                [
                    'CMD',
                    'redis-cli',
                    '-a',
                    '${REDIS_PASSWORD:-redis_password}',
                    'ping',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - transvirex-network

    mongodb:
        image: mongo:7
        container_name: transvirex-mongodb
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-mongo_user}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-mongo_password}
            MONGO_INITDB_DATABASE: ${MONGODB_DB:-transvirex}
        volumes:
            - mongodb_data:/data/db
        restart: unless-stopped
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh --quiet
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - transvirex-network

    nginx:
        image: nginx:alpine
        container_name: transvirex-nginx
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./development/cert/:/etc/nginx/cert/:ro
            - ./development/nginx.conf:/etc/nginx/nginx.conf:ro
        restart: unless-stopped
        depends_on:
            - frontend
            - gateway-service
            - rabbitmq
        healthcheck:
            test: ['CMD', 'nginx', '-t']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - transvirex-network
        develop:
            watch:
                - path: ./development/nginx.conf
                  action: sync+restart
                  target: /etc/nginx/nginx.conf

volumes:
    postgres_data:
        name: transvirex_postgres_data
        driver: local
    rabbitmq_data:
        name: transvirex_rabbitmq_data
        driver: local
    redis_data:
        name: transvirex_redis_data
        driver: local
    mongodb_data:
        name: transvirex_mongodb_data
        driver: local

networks:
    transvirex-network:
        driver: bridge
